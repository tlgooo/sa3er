<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سعّر | حاسبة تسعير المؤثرين العرب</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style> 
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --teal-50:#E1F5EE;--teal-600:#0F6E56;--teal-800:#085041;--teal-900:#04342C;
  --amber-600:#854F0B;
  --bg:#f5fdf9;--white:#ffffff;--text-primary:#0d2b1f;--text-muted:#6b9e87;
  --border:#c8ede0;--border-light:#e2f5ec;
  --shadow-md:0 4px 20px rgba(13,110,86,0.12);
  --radius-lg:18px;
}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text-primary);direction:rtl;padding-bottom:80px;}
nav{background:var(--white);border-bottom:1px solid var(--border-light);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-logo{font-size:22px;font-weight:900;color:var(--teal-800);}
.nav-logo span{color:var(--amber-600);}
.tabs-wrap{max-width:720px;margin:0 auto;padding:0 16px;}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);margin:28px 0 20px;}
.tab-btn{padding:16px 12px;font-size:14px;font-weight:700;background:none;border:none;cursor:pointer;color:var(--text-muted);border-bottom:3px solid transparent;}
.tab-btn.active{color:var(--teal-600);border-bottom-color:var(--teal-600);background:var(--teal-50);}
.panel{display:none;}.panel.active{display:block;}
.card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--border);padding:24px;margin-bottom:16px;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--teal-600),var(--amber-600));}
.field{margin-bottom:16px;}
.field label{font-size:12px;font-weight:700;color:var(--text-primary);display:block;margin-bottom:7px;}
.field select,.field input{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;font-family:'Cairo',sans-serif;direction:rtl;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.chip{padding:8px 15px;border:1.5px solid var(--border);border-radius:30px;font-size:12px;font-weight:700;cursor:pointer;background:var(--white);color:var(--text-muted);}
.chip.active{background:var(--teal-600);border-color:var(--teal-600);color:var(--white);}
.btn-primary{width:100%;padding:15px 20px;background:var(--teal-600);color:var(--white);border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;}
.result-box{display:none;margin-top:20px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);}
.result-header{background:var(--teal-800);padding:18px 20px;text-align:center;color:var(--white);}
.price-grid{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--border-light);gap:1px;}
.price-cell{background:var(--white);padding:18px 10px;text-align:center;}
.price-num{font-size:22px;font-weight:900;font-family:'IBM Plex Mono',monospace;}
.price-num.rec{font-size:28px;color:var(--teal-600);}
.btn-secondary{width:100%;padding:12px 20px;background:var(--white);color:var(--teal-600);border:1.5px solid var(--teal-600);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.btn-amber{width:100%;padding:13px 20px;background:var(--amber-600);color:var(--white);border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;}
.btn-cash{width:100%;padding:15px 20px;background:#25D366;color:var(--white);border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:10px;}
.mk-preview{display:none;margin-top:20px;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);}
.mk-header{background:var(--teal-900);padding:28px 24px;text-align:center;}
.mk-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;font-weight:900;color:var(--white);}
.mk-name{font-size:20px;font-weight:900;color:var(--white);margin-bottom:7px;}
.mk-stats{display:grid;grid-template-columns:1fr 1fr 1fr;background:var(--border-light);gap:1px;}
.mk-stat{background:var(--white);padding:16px 8px;text-align:center;}
.mk-stat-val{font-size:20px;font-weight:900;color:var(--teal-600);font-family:'IBM Plex Mono',monospace;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">سعّ<span>ر</span></div>
</nav>

<div class="tabs-wrap">
  <div class="panel active" id="panel-calc">
    <div class="card">
      <div class="field">
        <label>📱 المنصة الرئيسية</label>
        <select id="platform">
          <option value="">— اختر المنصة —</option>
          <option value="instagram">انستجرام</option>
          <option value="tiktok">تيك توك</option>
          <option value="youtube">يوتيوب</option>
          <option value="facebook">فيسبوك</option>
          <option value="twitter">تويتر / X</option>
        </select>
      </div>
      <div class="two-col">
        <div class="field" style="margin:0">
          <label>👥 عدد المتابعين</label>
          <input type="number" id="followers" placeholder="مثال: 50000" min="0">
        </div>
        <div class="field" style="margin:0">
          <label>💬 معدل التفاعل %</label>
          <select id="engagement">
            <option value="">— اختر —</option>
            <option value="2">1٪ - 3٪</option>
            <option value="4">3٪ - 6٪</option>
            <option value="7">6٪ - 10٪</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="chips" id="marketChips">
        <button class="chip" data-v="egypt" onclick="selectChip(this,'market')">🇪🇬 مصر</button>
        <button class="chip active" data-v="arab" onclick="selectChip(this,'market')">🌍 عربي عام</button>
      </div>
    </div>

    <button class="btn-primary" onclick="calculate()"><i class="ti ti-calculator"></i> احسب سعري الآن</button>

    <div class="result-box" id="resultBox">
      <div class="result-header"><h3>💰 سعرك العادل للسبونسر</h3></div>
      <div class="price-grid">
        <div class="price-cell"><div class="price-lbl">الحد الأدنى</div><div class="price-num" id="priceMin">—</div><div class="price-cur">دولار</div></div>
        <div class="price-cell"><div class="price-lbl">السعر المقترح</div><div class="price-num rec" id="priceRec">—</div><div class="price-cur">دولار</div></div>
        <div class="price-cell"><div class="price-lbl">الحد الأقصى</div><div class="price-num" id="priceMax">—</div><div class="price-cur">دولار</div></div>
      </div>
    </div>

    <button class="btn-secondary" id="btnMediaKit" onclick="showMediaKit()" style="display:none">
      <i class="ti ti-id-badge"></i> اعمل ميديا كيت بالأرقام دي
    </button>

    <div class="mk-preview" id="mkPreview">
      <div class="mk-header" id="mkToPrint">
        <div class="mk-avatar">س</div>
        <div class="mk-name">المؤثر العربي</div>
        <div class="mk-bio" style="color:var(--teal-100);font-size:12px;">تفاعل: <span id="mkEng">0%</span> | السوق: <span id="mkMarket">عربي</span></div>
        <div class="mk-stats">
          <div class="mk-stat"><div class="mk-stat-val" id="mkFollowers">0</div><div class="mk-stat-lbl">متابع</div></div>
          <div class="mk-stat"><div class="mk-stat-val" id="mkPrice">0$</div><div class="mk-stat-lbl">السعر</div></div>
          <div class="mk-stat"><div class="mk-stat-val" id="mkMin">0$</div><div class="mk-stat-lbl">الحد الأدنى</div></div>
        </div>
      </div>
      <button class="btn-amber" onclick="downloadPDF(false)"><i class="ti ti-download"></i> PDF مجاني بعلامة مائية SA3ER.COM</button>
      <button class="btn-cash" onclick="buyPDF()"><i class="ti ti-wallet"></i> اشتري النسخة النضيفة بـ 500 جنيه فودافون كاش</button>
    </div>
  </div>
</div>

<script>
let savedData = {};

function calculate() {
  const followers = parseInt(document.getElementById('followers').value) || 0;
  const engagement = parseFloat(document.getElementById('engagement').value) || 0;
  const platform = document.getElementById('platform').value;
  const market = document.querySelector('#marketChips .chip.active')?.dataset.v || 'arab';
  
  if(!platform || followers <= 0 || !engagement) {
    alert('املى كل البيانات المطلوبة');
    return;
  }
  
  let baseRate = market === 'egypt' ? 0.003 : 0.005;
  const base = followers * baseRate * (engagement/3);
  const min = Math.round(base * 0.7);
  const rec = Math.round(base);
  const max = Math.round(base * 1.5);
  
  document.getElementById('priceMin').textContent = min.toLocaleString();
  document.getElementById('priceRec').textContent = rec.toLocaleString();
  document.getElementById('priceMax').textContent = max.toLocaleString();
  document.getElementById('resultBox').style.display = 'block';
  
  savedData = {followers, engagement, platform, market, price: rec, min};
  document.getElementById('btnMediaKit').style.display = 'flex';
}

function showMediaKit() {
  document.getElementById('mkFollowers').textContent = savedData.followers.toLocaleString();
  document.getElementById('mkPrice').textContent = savedData.price + '$';
  document.getElementById('mkMin').textContent = savedData.min + '$';
  document.getElementById('mkEng').textContent = savedData.engagement + '%';
  document.getElementById('mkMarket').textContent = document.querySelector('#marketChips .chip.active').textContent.replace(/🇪🇬|🌍/g,'').trim();
  document.getElementById('mkPreview').style.display = 'block';
}

async function downloadPDF(isPaid) {
  const { jsPDF } = window.jspdf;
  const element = document.getElementById('mkToPrint');
  const canvas = await html2canvas(element, {scale: 2, backgroundColor: '#ffffff'});
  const pdf = new jsPDF('p', 'mm', 'a4');
  const w = pdf.internal.pageSize.getWidth();
  const h = (canvas.height * w) / canvas.width;
  pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, w, h);
  
  if(!isPaid) {
    pdf.setFontSize(28);
    pdf.setTextColor(200,200,200);
    pdf.text('SA3ER.COM - نسخة مجانية', w/2, h/2, {angle: 45, align: 'center'});
  }
  pdf.save(isPaid ? 'MediaKit_Nadeef.pdf' : 'MediaKit_Free.pdf');
}

function buyPDF() {
  const cashNumber = '01062183539'; // فودافون كاش
  const whatsappNumber = '201282175854'; // واتساب بصيغة دولية
  
  const message = `السلام عليكم 👋\nحولت 500 جنيه فودافون كاش على رقم ${cashNumber} عشان الميديا كيت النضيف.\n\nبياناتي:\n- المتابعين: ${savedData.followers.toLocaleString()}\n- التفاعل: ${savedData.engagement}%\n- السعر: ${savedData.price}$\n\nمرفق سكرين شوت التحويل 👇`;
  
  window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`, '_blank');
  alert('✅ 1. حول 500 جنيه على: ' + cashNumber + '\n2. خد سكرين\n3. ابعت على واتساب\n4. هرد عليك بالـ PDF النضيف');
}

function selectChip(el, group) {
  document.querySelectorAll('#' + group + 'Chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}
</script>
</body>
</html>
