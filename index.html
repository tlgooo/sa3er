<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سعّر - حاسبة المؤثرين</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);padding:20px;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:520px;width:100%;background:#fff;border-radius:25px;padding:35px;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.logo{text-align:center;font-size:32px;font-weight:700;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.subtitle{text-align:center;color:#999;font-size:13px;margin-bottom:30px}
.input-group{margin-bottom:22px}
label{display:block;margin-bottom:8px;color:#555;font-weight:600;font-size:14px}
input,select{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:12px;font-size:16px;outline:none;transition:0.3s;background:#fafafa}
input:focus,select:focus{border-color:#667eea;background:#fff;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;margin-top:12px;transition:0.3s;box-shadow:0 4px 15px rgba(102,126,234,0.3)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.4)}
.btn-admin{background:linear-gradient(135deg,#10b981 0%,#059669 100%);display:none;box-shadow:0 4px 15px rgba(16,185,129,0.3)}
.btn-admin:hover{box-shadow:0 8px 25px rgba(16,185,129,0.4)}
.result{display:none;margin-top:35px;padding:35px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:20px;color:#fff;text-align:center;animation:fadeIn 0.5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.result-label{font-size:14px;opacity:0.9;margin-bottom:8px}
.price{font-size:52px;font-weight:700;margin:12px 0;text-shadow:0 2px 10px rgba(0,0,0,0.2)}
.price-details{font-size:13px;opacity:0.8;margin-top:10px}
.watermark{margin-top:25px;font-size:12px;opacity:0.6;border-top:1px solid rgba(255,255,255,0.3);padding-top:15px}
.note{margin-top:20px;padding:12px;background:#fff3cd;border-left:4px solid #ffc107;border-radius:8px;font-size:12px;color:#856404;text-align:right}
</style>
</head>
<body>
<div class="container">
  <div class="logo">سعّر</div>
  <div class="subtitle">حاسبة تسعير المؤثرين العرب</div>

  <div class="input-group">
    <label>🎯 التخصص</label>
    <select id="niche">
      <option value="1">عام - General</option>
      <option value="1.5">فاينانس/استثمار - Finance</option>
      <option value="1.4">تكنولوجيا - Tech</option>
      <option value="1.3">موضة/بيوتي - Fashion</option>
      <option value="1.2">لياقة/صحة - Fitness</option>
      <option value="1">أكل - Food</option>
      <option value="0.9">ترفيه - Entertainment</option>
      <option value="0.8">كوميديا - Comedy</option>
    </select>
  </div>

  <div class="input-group">
    <label>👁️ متوسط المشاهدات لكل ريل</label>
    <input type="number" id="views" placeholder="مثال: 50000" min="0">
  </div>

  <div class="input-group">
    <label>💰 سعر الـ 1000 مشاهدة CPM بالدولار</label>
    <input type="number" id="cpm" value="10" step="0.5" min="1">
  </div>

  <button class="btn" onclick="calc()">🚀 احسب سعري</button>
  <button class="btn btn-admin" id="adminBtn" onclick="downloadPDF(true)">🔑 تحميل PDF نضيف - للأدمن</button>

  <div class="result" id="result">
    <div class="result-label">سعر الريل 30 ثانية</div>
    <div class="price" id="price">$0</div>
    <div class="price-details" id="details">0 مشاهدة × 10$ CPM</div>
    <div class="watermark">SA3ER.COM - النسخة المجانية</div>
    <div class="note">💡 افتح الرابط +?admin=sa3er عشان تشيل العلامة المائية</div>
  </div>
</div>

<script>
function calc(){
  const views = parseFloat(document.getElementById('views').value) || 0;
  const cpm = parseFloat(document.getElementById('cpm').value) || 10;
  const niche = parseFloat(document.getElementById('niche').value) || 1;
  const nicheText = document.getElementById('niche').options[document.getElementById('niche').selectedIndex].text;

  if(views <= 0){
    alert('دخل متوسط المشاهدات الأول يا معلم');
    return;
  }

  const basePrice = views/1000*cpm;
  const finalPrice = (basePrice * niche).toFixed(0);

  document.getElementById('price').textContent = '$' + finalPrice;
  document.getElementById('details').textContent = views.toLocaleString('en') + ' مشاهدة × ' + cpm + '$ CPM × معامل ' + nicheText.split('-')[0];
  document.getElementById('result').style.display = 'block';

  // إظهار زرار الأدمن لو الرابط فيه?admin=sa3er
  if(window.location.search.includes('admin=sa3er')){
    document.getElementById('adminBtn').style.display = 'block';
  }

  window.scrollTo({top: document.getElementById('result').offsetTop - 50, behavior: 'smooth'});
}

async function downloadPDF(isAdmin){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');

  // صفحة بيضا نضيفة
  pdf.setFillColor(255,255,255);
  pdf.rect(0,0,210,297,'F');

  // اللوجو
  pdf.setFontSize(24);
  pdf.setTextColor(102,126,234);
  pdf.text('Sa3er', 105, 40, {align:'center'});

  pdf.setFontSize(14);
  pdf.setTextColor(100);
  pdf.text('Media Kit 2026', 105, 50, {align:'center'});

  // السعر الكبير
  pdf.setFontSize(48);
  pdf.setTextColor(0);
  pdf.text(document.getElementById('price').textContent, 105, 90, {align:'center'});

  pdf.setFontSize(16);
  pdf.text('سعر الريل 30 ثانية', 105, 105, {align:'center'});

  // التفاصيل
  pdf.setFontSize(12);
  pdf.setTextColor(80);
  const details = document.getElementById('details').textContent;
  pdf.text(details, 105, 125, {align:'center'});

  // خط فاصل
  pdf.setDrawColor(200);
  pdf.line(30, 140, 180, 140);

  // بيانات التواصل
  pdf.setFontSize(14);
  pdf.setTextColor(0);
  pdf.text('للتواصل والاعلانات:', 105, 155, {align:'center'});

  pdf.setFontSize(12);
  pdf.setTextColor(100);
  pdf.text('Instagram: @your_username', 105, 170, {align:'center'});
  pdf.text('Email: your@email.com', 105, 180, {align:'center'});
  pdf.text('WhatsApp: +20 XXXX XXXX', 105, 190, {align:'center'});

  // العلامة المائية - تتشال للأدمن
  if(!isAdmin){
    pdf.setFontSize(10);
    pdf.setTextColor(180);
    pdf.text('SA3ER.COM - النسخة المجانية', 105, 280, {align:'center'});
  } else {
    pdf.setFontSize(8);
    pdf.setTextColor(150);
    pdf.text('Generated by Sa3er - Admin Version', 105, 280, {align:'center'});
  }

  const filename = isAdmin? 'media-kit-pro.pdf' : 'media-kit-free.pdf';
  pdf.save(filename);
}

// تشغيل بالـ Enter
document.addEventListener('keypress', function(e){
  if(e.key === 'Enter') calc();
});

// تشغيل تلقائي لو فيه باراميتر أدمن
window.onload = function(){
  if(window.location.search.includes('admin=sa3er')){
    console.log('وضع الأدمن مفعل - العلامة المائية هتتشال');
  }
}
</script>
</body>
</html>
